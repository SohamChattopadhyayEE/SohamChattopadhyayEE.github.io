<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Soham Chattopadhyay — Robotics & Computer Vision Engineer, PhD Aspirant"/>
  <title>Soham Chattopadhyay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- Navigation -->
  <nav id="main-nav"></nav>

  <main>
    <!-- Profile photo + name + social links -->
    <div id="profile-section"></div>

    <!-- Biography -->
    <div id="bio-section"></div>

    <!-- News preview -->
    <div id="news-preview"></div>

    <!-- Projects preview -->
    <div id="projects-preview"></div>

    <!-- Publications preview -->
    <div id="publications-preview"></div>

    <!-- Patents preview -->
    <div id="patents-preview"></div>
  </main>

  <div id="main-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script>
    buildNav();
    buildProfile();
    buildBio();

    buildHomeSection({
      containerId: "news-preview",
      title:       "News",
      href:        "news.html",
      items:       DATA.news,
      renderCard:  newsCard
    });

    buildHomeSection({
      containerId: "projects-preview",
      title:       "Projects",
      href:        "projects.html",
      items:       DATA.projects,
      renderCard:  projectCard
    });

    buildHomeSection({
      containerId: "publications-preview",
      title:       "Publications",
      href:        "publications.html",
      items:       DATA.publications,
      renderCard:  publicationCard
    });

    buildHomeSection({
      containerId: "patents-preview",
      title:       "Patents",
      href:        "patents.html",
      items:       DATA.patents,
      renderCard:  patentCard
    });

    buildFooter();
  </script>
</body>
</html>
